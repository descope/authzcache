name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PEM }}

      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: go

  publish-dockerhub:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup repository dependencies
        id: setup
        uses: ./.github/actions/setup
        env:
          RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
          RELEASE_APP_PEM: ${{ secrets.RELEASE_APP_PEM }}

      - name: Setup build args
        id: setup-build-args
        shell: bash
        run: |
          source configs/dev/deploy.env || true
          source configs/dev/config.env || true
          echo "build_dir=${BUILD_DIR}" >> "${GITHUB_OUTPUT}"
          echo "port=${PORT}" >> "${GITHUB_OUTPUT}"
          echo "repo_name=${REPO_NAME}" >> "${GITHUB_OUTPUT}"
          echo "dockerfile=./Dockerfile" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose Docker Hub semver tags
        id: dockerhub-tags
        shell: bash
        env:
          IMAGE: docker.io/descope/${{ steps.setup-build-args.outputs.repo_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
          MAJOR: ${{ needs.release-please.outputs.major }}
          MINOR: ${{ needs.release-please.outputs.minor }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:${MAJOR}.${MINOR}"
            echo "${IMAGE}:${MAJOR}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          version: latest
          cache-binary: false

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ steps.setup-build-args.outputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.dockerhub-tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.setup-build-args.outputs.repo_name }}
            org.opencontainers.image.version=${{ needs.release-please.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          secrets: |
            "github_token=${{ steps.setup.outputs.token }}"
          build-args: |
            build_dir=${{ steps.setup-build-args.outputs.build_dir }}
            port=${{ steps.setup-build-args.outputs.port }}
            repo_name=${{ steps.setup-build-args.outputs.repo_name }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub README
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: descope/${{ steps.setup-build-args.outputs.repo_name }}
          readme-filepath: ./README.md
